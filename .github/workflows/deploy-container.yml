name: Build and Push to ECR and GHCR

on:
  push:
    branches:
      - Continuous-Integration

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set build variables
        run: |
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "TIMESTAMP=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_ENV
          echo "ORG_NAME=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and tag Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.REPO_NAME_CI }}
          IMAGE_TAG: ${{ env.COMMIT_HASH }}-${{ env.TIMESTAMP }}
          BUILD_COMMIT_SHA: ${{ env.COMMIT_HASH }}
        run: |
          echo "🔧 Building image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          docker build -f Dockerfile.ci \
            --build-arg BUILD_COMMIT_SHA=$BUILD_COMMIT_SHA \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.REPO_NAME_CI }}
          IMAGE_TAG: ${{ env.COMMIT_HASH }}-${{ env.TIMESTAMP }}
        run: |
          echo "📤 Pushing to ECR"
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Tag image for GHCR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.REPO_NAME_CI }}
          IMAGE_TAG: ${{ env.COMMIT_HASH }}-${{ env.TIMESTAMP }}
          ORG_NAME: ${{ env.ORG_NAME }}
        run: |
          echo "🏷️ Tagging for GHCR"
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ghcr.io/$ORG_NAME/ci-app:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:latest ghcr.io/$ORG_NAME/ci-app:latest

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Push image to GHCR
        env:
          IMAGE_TAG: ${{ env.COMMIT_HASH }}-${{ env.TIMESTAMP }}
          ORG_NAME: ${{ env.ORG_NAME }}
        run: |
          echo "📤 Pushing to GHCR"
          docker push ghcr.io/$ORG_NAME/ci-app:$IMAGE_TAG
          docker push ghcr.io/$ORG_NAME/ci-app:latest

      - name: Trigger Render Deploy Hook
        run: |
          echo "🚀 Triggering Render deployment..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
